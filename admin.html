<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wysraq Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #080c10; color: #e8f0f8; min-height: 100vh; }

    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: #0d1117;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .login-box h1 {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 6px;
      color: #00e5a0;
    }

    .login-box p { font-size: 13px; color: #8899aa; margin-bottom: 28px; }

    input {
      width: 100%;
      padding: 12px 16px;
      background: #111820;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      color: #e8f0f8;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      margin-bottom: 12px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus { border-color: rgba(0,229,160,0.4); }

    .btn {
      width: 100%;
      padding: 12px;
      background: #00e5a0;
      color: #080c10;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: #00cc8e; }

    .error { color: #f87171; font-size: 13px; margin-top: 10px; }

    /* DASHBOARD */
    .dashboard { display: none; }

    nav {
      background: rgba(8,12,16,0.95);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-brand {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: #00e5a0;
    }

    .nav-brand span { color: #8899aa; font-size: 13px; font-weight: 400; margin-left: 8px; }

    .logout-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      color: #8899aa;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .logout-btn:hover { color: #e8f0f8; border-color: rgba(255,255,255,0.2); }

    .content { padding: 32px; max-width: 1100px; margin: 0 auto; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: #0d1117;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 20px 24px;
    }

    .stat-label { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: #8899aa; margin-bottom: 8px; }
    .stat-num { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; color: #00e5a0; }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #e8f0f8;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #0d1117;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      overflow: hidden;
    }

    th {
      text-align: left;
      padding: 12px 16px;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #8899aa;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      background: #111820;
    }

    td {
      padding: 14px 16px;
      font-size: 13px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: #e8f0f8;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge-premium {
      background: rgba(0,229,160,0.12);
      color: #00e5a0;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-free {
      background: rgba(255,255,255,0.05);
      color: #8899aa;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
    }

    .action-btn {
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-upgrade {
      background: rgba(0,229,160,0.12);
      color: #00e5a0;
      border: 1px solid rgba(0,229,160,0.2);
    }

    .btn-upgrade:hover { background: rgba(0,229,160,0.2); }

    .btn-downgrade {
      background: rgba(248,113,113,0.1);
      color: #f87171;
      border: 1px solid rgba(248,113,113,0.2);
    }

    .btn-downgrade:hover { background: rgba(248,113,113,0.2); }

    .toast-msg {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #0d1117;
      border: 1px solid rgba(0,229,160,0.3);
      color: #00e5a0;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .email-cell { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-wrap" id="loginWrap">
    <div class="login-box">
      <h1>Wysraq Admin</h1>
      <p>Enter your admin password to continue</p>
      <input type="password" id="adminPass" placeholder="Admin password" onkeydown="if(event.key==='Enter') login()"/>
      <button class="btn" onclick="login()">Enter</button>
      <div class="error" id="loginError"></div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <nav>
      <div class="nav-brand">Wysraq Admin <span>Control Panel</span></div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </nav>

    <div class="content">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Total Users</div>
          <div class="stat-num" id="statTotal">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Premium Users</div>
          <div class="stat-num" id="statPremium">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Messages</div>
          <div class="stat-num" id="statMessages">—</div>
        </div>
      </div>

      <div class="section-title">All Users</div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Name</th>
            <th>Plan</th>
            <th>Q&A</th>
            <th>Messages</th>
            <th>Joined</th>
            <th>Expiry</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="userTable">
      <tr><td colspan="9" style="text-align:center; color:#8899aa; padding:32px;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="toast-msg" id="toast"></div>

  <script>
    let adminPassword = '';

    async function login() {
      const pass = document.getElementById('adminPass').value;
      if (!pass) return;

      const res = await fetch('https://wysraq.me/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pass })
      });
      const data = await res.json();

      if (data.success) {
        adminPassword = pass;
        document.getElementById('loginWrap').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadUsers();
      } else {
        document.getElementById('loginError').textContent = 'Wrong password!';
      }
    }

    function logout() {
      adminPassword = '';
      document.getElementById('loginWrap').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('adminPass').value = '';
    }

    async function loadUsers() {
      const res = await fetch(`https://wysraq.me/api/admin/users?password=${encodeURIComponent(adminPassword)}`);
      const data = await res.json();

      if (!data.success) return;

      const users = data.users;
      const premiumCount = users.filter(u => u.is_premium).length;
      const totalMessages = users.reduce((sum, u) => sum + u.total_messages, 0);

      document.getElementById('statTotal').textContent = users.length;
      document.getElementById('statPremium').textContent = premiumCount;
      document.getElementById('statMessages').textContent = totalMessages;

      const tbody = document.getElementById('userTable');
      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; color:#8899aa; padding:32px;">No users yet</td></tr>';
        return;
      }

      tbody.innerHTML = users.map(u => `
        <tr>
          <td>${u.id}</td>
          <td class="email-cell" title="${u.email}">${u.email}</td>
          <td>${u.name || '—'}</td>
          <td>
            <span class="${u.is_premium ? 'badge-premium' : 'badge-free'}">${u.plan}</span>
          </td>
          <td>${u.qa_count}</td>
          <td>${u.total_messages}</td>
          <td>${u.joined}</td>
          <td style="color:${u.is_premium ? '#00e5a0' : '#8899aa'};">${u.premium_expiry || '—'}</td>
          <td>
            ${u.is_premium
              ? `<button class="action-btn btn-downgrade" onclick="setPremium(${u.id}, false)">Downgrade</button>`
              : `<button class="action-btn btn-upgrade" onclick="setPremium(${u.id}, true)">Upgrade ⭐</button>`
            }
          </td>
        </tr>
      `).join('');
    }

    async function setPremium(userId, isPremium) {
      const res = await fetch('https://wysraq.me/api/admin/set-premium', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ admin_password: adminPassword, user_id: userId, is_premium: isPremium })
      });
      const data = await res.json();
      if (data.success) {
        showToast(data.message);
        loadUsers();
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(() => { t.style.display = 'none'; }, 3000);
    }
  </script>
</body>
</html>
